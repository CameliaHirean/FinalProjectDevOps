name: Pipeline 3 - Production Blue/Green Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: true
        type: string

jobs:

  # ---------------------------------------------------------
  # 1. Detect idle environment
  # ---------------------------------------------------------
  detect_idle:
    runs-on: ubuntu-latest
    env:
      NGINX_HOST: ${{ secrets.NGINX_HOST }}

    outputs:
      idle_env: ${{ steps.detect.outputs.idle_env }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Detect idle environment
        id: detect
        run: |
          IDLE=$(ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$NGINX_HOST \
            "bash ~/scripts/detect_idle.sh")

          echo "Idle environment: $IDLE"
          echo "idle_env=$IDLE" >> $GITHUB_OUTPUT


  # ---------------------------------------------------------
  # 2. Deploy to idle environment
  # ---------------------------------------------------------
  deploy_to_idle:
    runs-on: ubuntu-latest
    needs: detect_idle

    env:
      BLUE_HOST: ${{ secrets.BLUEGREEN_HOST_BLUE }}
      GREEN_HOST: ${{ secrets.BLUEGREEN_HOST_GREEN }}

    steps:
      - name: Add SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy to idle environment
        run: |
          IDLE=${{ needs.detect_idle.outputs.idle_env }}

          if [ "$IDLE" = "blue" ]; then
            HOST=${BLUE_HOST}
          else
            HOST=${GREEN_HOST}
          fi

          echo "Deploying image ${{ github.event.inputs.image_tag }} to $IDLE at $HOST"

          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$HOST \
            "bash ~/scripts/deploy_idle.sh ${{ github.event.inputs.image_tag }} $IDLE"

  # ---------------------------------------------------------
  # 3. Health check
  # ---------------------------------------------------------
  health_check:
    runs-on: ubuntu-latest
    needs: [detect_idle, deploy_to_idle]
    env:
      BLUE_HOST: ${{ secrets.BLUEGREEN_HOST_BLUE }}
      GREEN_HOST: ${{ secrets.BLUEGREEN_HOST_GREEN }}

    steps:
      - name: Add SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Health check
        run: |
          IDLE=${{ needs.detect_idle.outputs.idle_env }}

          if [ "$IDLE" = "blue" ]; then
            HOST=${BLUE_HOST}
          else
            HOST=${GREEN_HOST}
          fi

          echo "Running health check on $IDLE ($HOST)"

          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$HOST \
            "bash ~/scripts/health_check.sh $IDLE"

  # ---------------------------------------------------------
  # 4. Switch traffic
  # ---------------------------------------------------------
  switch_traffic:
    runs-on: ubuntu-latest
    needs: [detect_idle, health_check]
    env:
      NGINX_HOST: ${{ secrets.NGINX_HOST }}

    steps:
      - name: Add SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Switch traffic
        run: |
          IDLE=${{ needs.detect_idle.outputs.idle_env }}

          echo "Switching Nginx traffic to $IDLE"

          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$NGINX_HOST \
            "bash ~/scripts/switch_traffic.sh $IDLE"

  # ---------------------------------------------------------
  # 5. Rollback monitor
  # ---------------------------------------------------------
  rollback_monitor:
    runs-on: ubuntu-latest
    needs: [detect_idle, switch_traffic]
    env:
      NGINX_HOST: ${{ secrets.NGINX_HOST }}

    steps:
      - name: Add SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Rollback monitor
        run: |
          IDLE=${{ needs.detect_idle.outputs.idle_env }}

          echo "Starting rollback monitor for $IDLE"

          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$NGINX_HOST \
            "bash ~/scripts/rollback_monitor.sh https://your-production-url $IDLE"
