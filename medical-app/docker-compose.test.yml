services:
  app:
    image: ghcr.io/cameliahirean/medical-app:latest
    ports:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/hello').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      app:
        condition: service_healthy
    environment:
      - STAGING_URL=http://app:3000
